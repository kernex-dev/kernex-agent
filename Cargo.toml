[package]
name = "kernex-agent"
version = "0.1.0"
edition = "2021"
description = "CLI dev assistant powered by Kernex runtime"
license = "MIT"
repository = "https://github.com/kernex-dev/kernex-agent"
homepage = "https://kernex.dev"
documentation = "https://docs.rs/kernex-agent"
keywords = ["ai", "agent", "cli", "assistant", "coding"]
categories = ["development-tools", "command-line-utilities"]
readme = "README.md"

[[bin]]
name = "kx"
path = "src/main.rs"

[dependencies]
kernex-runtime = "0.3"
kernex-core = "0.3"
kernex-providers = "0.3"
tokio = { version = "1", features = ["full"] }
clap = { version = "4", features = ["derive"] }
colored = "2"
dirs = "6"
rustyline = "15"
indicatif = "0.18"
serde = { version = "1", features = ["derive"] }
toml = "0.8"
