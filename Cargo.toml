[package]
name = "kernex-agent"
version = "0.1.0"
edition = "2021"
rust-version = "1.74"
description = "CLI dev assistant powered by Kernex runtime"
license = "Apache-2.0 OR MIT"
repository = "https://github.com/kernex-dev/kernex-agent"
homepage = "https://kernex.dev"
documentation = "https://docs.rs/kernex-agent"
keywords = ["ai", "agent", "cli", "assistant", "coding"]
categories = ["development-tools", "command-line-utilities"]
readme = "README.md"

[[bin]]
name = "kx"
path = "src/main.rs"

[dependencies]
kernex-runtime = "0.4.0"
kernex-core = "0.4.0"
kernex-providers = "0.4.0"
kernex-pipelines = "0.4.0"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time", "rt"] }
clap = { version = "4", features = ["derive"] }
colored = "2"
dirs = "6"
rustyline = "15"
indicatif = "0.17"
serde = { version = "1", features = ["derive"] }
toml = "0.8"
sha2 = "0.10"
ureq = "2"
kernex-sandbox = "0.4.0"
tracing = "0.1"
