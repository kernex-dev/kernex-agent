[package]
name = "kernex-agent"
version = "0.1.0"
edition = "2021"
description = "CLI dev assistant powered by Kernex runtime"
license = "MIT"

[[bin]]
name = "kx"
path = "src/main.rs"

[dependencies]
kernex-runtime = "0.3"
kernex-core = "0.3"
kernex-providers = "0.3"
tokio = { version = "1", features = ["full"] }
clap = { version = "4", features = ["derive"] }
colored = "2"
dirs = "6"
rustyline = "15"
