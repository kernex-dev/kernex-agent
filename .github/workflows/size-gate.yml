name: size-gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

# This file lives in kernex-agent (the public kx binary crate). It enforces
# the cargo-feature-graph contract: a minimal-variant dep-tree leak audit
# plus the bloat and unused-deps jobs that mirror the conventions used in
# the sister workspace at kernex-dev/kernex.
#
# The per-variant binary-size matrix and the macOS-aarch64 hard-ceiling
# check moved to `binary-size-build.yml` so the size results can be posted
# as a sticky `## Binary Sizes` comment on every PR via the companion
# `binary-size-comment.yml` workflow.

jobs:
  dep-tree-audit:
    name: Minimal-variant dep-tree leak audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Capture minimal dep tree
        run: |
          cargo tree -e normal --no-default-features --features memory-cli \
            > /tmp/dep-tree-minimal.txt
      - name: Fail if serve-only or TUI deps leak into minimal
        run: |
          set -euo pipefail
          # The grep matches deps that the `serve` and `tui` features
          # are expected to keep out of the minimal variant: `axum`,
          # `hmac`, and `rusqlite` are direct serve-only deps;
          # `ratatui` and `crossterm` are direct tui-only deps. All
          # five must be absent from the minimal dep tree.
          #
          # `subtle` and `uuid` are deliberately NOT in this grep even
          # though they are listed under the `serve` feature in
          # Cargo.toml. They reach the binary transitively: `subtle`
          # via `rustls` (which `reqwest` and `ureq` both consume
          # unconditionally) and `uuid` via `kernex-core`. The `serve`
          # gate cannot remove them without a workspace-wide refactor
          # of those carriers; their per-feature declarations are
          # manifest hygiene only.
          if grep -E 'axum|hmac|rusqlite|ratatui|crossterm' /tmp/dep-tree-minimal.txt; then
            echo "::error::serve-only or TUI deps leaked into minimal variant"
            exit 1
          fi
          echo "minimal dep tree clean of serve-only and TUI deps"

  bloat:
    name: Bloat diff vs baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo-bloat
        run: cargo install cargo-bloat --locked
      - name: Run cargo-bloat against default kx binary
        run: |
          cargo bloat --release --bin kx --crates -n 30 \
            > /tmp/agent-bloat-current-crates.txt 2> /dev/null
      - name: Diff against committed baseline
        run: |
          set -euo pipefail
          # Baseline rebased 2026-05-11 after the kernex-* 0.5.0 -> 0.6.0
          # workspace bump landed direct to main (commit edc1a83) and added
          # net binary weight that the previous 2026-05-10 baseline did not
          # account for. The 2026-05-10 file is retained alongside as the
          # historical Phase B record.
          BASELINE=docs/agent-bloat-baseline-2026-05-11-crates.txt
          if [ ! -f "$BASELINE" ]; then
            echo "baseline not found at $BASELINE; skipping diff"
            exit 0
          fi
          echo "Diffing against $BASELINE"
          python3 scripts/diff-bloat.py "$BASELINE" /tmp/agent-bloat-current-crates.txt

  unused-deps:
    name: Unused dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-machete
        run: cargo install cargo-machete --locked
      - name: Run cargo-machete
        run: cargo machete
