name: size-gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

# This file lives in kernex-agent (the public kx binary crate). It enforces
# the cargo-feature-graph contract: per-variant binary ceilings plus a
# minimal-variant dep-tree leak audit. The bloat and unused-deps jobs
# mirror the conventions used in the sister workspace at kernex-dev/kernex.

jobs:
  binary-size:
    name: Binary size (kx default, macOS aarch64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build kx (default features)
        run: cargo build --release --bin kx --locked
      - name: Hard ceiling check (15 MB)
        run: bash scripts/check-size.sh kx 15728640 target/release/kx
      - name: Soft warn at 13 MB (informational, not a gate)
        if: always()
        run: |
          set -euo pipefail
          BIN=target/release/kx
          if [ ! -f "$BIN" ]; then
            echo "binary not present; skipping soft warn" >&2
            exit 0
          fi
          SIZE=$(stat -f%z "$BIN")
          SOFT=13631488  # 13 MiB
          HUMAN_MB=$(awk -v n="$SIZE" 'BEGIN{ printf "%.2f", n/1048576 }')
          {
            echo "### kx default (macOS aarch64): ${HUMAN_MB} MiB"
            echo ""
            echo "- hard ceiling: 15.00 MiB"
            echo "- soft warn: 13.00 MiB"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$SIZE" -gt "$SOFT" ]; then
            echo "::warning::kx default is ${HUMAN_MB} MiB (> 13.00 MiB soft warn)"
          fi

  feature-matrix:
    name: Feature matrix (per-variant build and size)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: default
            flags: ""
            mode: hard
            limit: 15728640
          - name: minimal
            flags: "--no-default-features --features memory-cli"
            mode: soft
            limit: 8388608
          - name: full
            flags: "--features agent-all,tui,serve,preset-all"
            mode: info
            limit: 0
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build variant
        run: cargo build --release --bin kx ${{ matrix.config.flags }} --locked
      - name: Hard ceiling check (default only)
        if: matrix.config.mode == 'hard'
        run: bash scripts/check-size.sh "${{ matrix.config.name }}" ${{ matrix.config.limit }} target/release/kx
      - name: Record size and soft warn
        if: matrix.config.mode != 'hard'
        run: |
          set -euo pipefail
          BIN=target/release/kx
          SIZE=$(stat -c%s "$BIN")
          HUMAN_MB=$(awk -v n="$SIZE" 'BEGIN{ printf "%.2f", n/1048576 }')
          NAME="${{ matrix.config.name }}"
          MODE="${{ matrix.config.mode }}"
          LIMIT="${{ matrix.config.limit }}"
          {
            echo "### kx ${NAME}: ${HUMAN_MB} MiB"
            echo ""
            echo "- mode: ${MODE} (informational, not a gate)"
            if [ "${MODE}" = "soft" ]; then
              SOFT_HUMAN=$(awk -v n="$LIMIT" 'BEGIN{ printf "%.2f", n/1048576 }')
              echo "- soft warn target: ${SOFT_HUMAN} MiB"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "${MODE}" = "soft" ] && [ "$SIZE" -gt "$LIMIT" ]; then
            echo "::warning::${NAME} is ${HUMAN_MB} MiB (> soft warn target)"
          fi

  dep-tree-audit:
    name: Minimal-variant dep-tree leak audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Capture minimal dep tree
        run: |
          cargo tree -e normal --no-default-features --features memory-cli \
            > /tmp/dep-tree-minimal.txt
      - name: Fail if serve-only or TUI deps leak into minimal
        run: |
          set -euo pipefail
          if grep -E 'axum|hmac|subtle|uuid|rusqlite|ratatui|crossterm' /tmp/dep-tree-minimal.txt; then
            echo "::error::serve-only or TUI deps leaked into minimal variant"
            exit 1
          fi
          echo "minimal dep tree clean of serve-only and TUI deps"

  bloat:
    name: Bloat diff vs baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo-bloat
        run: cargo install cargo-bloat --locked
      - name: Run cargo-bloat against default kx binary
        run: |
          cargo bloat --release --bin kx --crates -n 30 \
            > /tmp/agent-bloat-current-crates.txt 2> /dev/null
      - name: Diff against committed baseline
        run: |
          set -euo pipefail
          BASELINE=docs/agent-bloat-baseline-2026-05-10-crates.txt
          if [ ! -f "$BASELINE" ]; then
            echo "baseline not found at $BASELINE; skipping diff"
            exit 0
          fi
          echo "Diffing against $BASELINE"
          python3 scripts/diff-bloat.py "$BASELINE" /tmp/agent-bloat-current-crates.txt

  unused-deps:
    name: Unused dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-machete
        run: cargo install cargo-machete --locked
      - name: Run cargo-machete
        run: cargo machete
